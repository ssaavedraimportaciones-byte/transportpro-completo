name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node y psql
        run: |
          npm install -g surge
          sudo apt-get install -y postgresql-client 2>/dev/null || true

      - name: Deploy a Surge
        run: |
          set -e
          FRESH=$(curl -sf -X POST "https://surge.sh/token" \
            -u "ssaavedra.importaciones@gmail.com:No8686no" | tr -d '"')
          if [ -z "$FRESH" ]; then
            echo "❌ ERROR: No se pudo obtener token de Surge (respuesta vacía)"
            exit 1
          fi
          echo "Token obtenido: ${FRESH:0:8}... (${#FRESH} chars)"
          SURGE_TOKEN="$FRESH" surge . transportpro-nuevo.surge.sh
          echo "✅ Deploy completado exitosamente"

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          echo "🔄 Aplicando migraciones en orden..."
          FAILED=0
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            if output=$(psql "$DB_URL" -f "$f" --set ON_ERROR_STOP=0 2>&1); then
              echo "   ✓ OK"
            else
              FAILED=$((FAILED+1))
              echo "   ⚠ Terminó con error (puede ser ya-aplicado):"
              echo "$output" | grep -v "^NOTICE" || true
            fi
          done
          echo ""
          if [ $FAILED -gt 0 ]; then
            echo "⚠️  $FAILED migración(es) con error — revisar logs arriba"
          else
            echo "✅ Todas las migraciones completadas sin errores"
          fi
