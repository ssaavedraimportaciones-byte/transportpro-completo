name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Surge
        run: npm install -g surge

      # TODO: después de ejecutar setup-github-secrets.py, reemplaza los fallbacks
      # por solo ${{ secrets.SURGE_LOGIN }} etc. (sin el || '...')
      - name: Teardown y redeploy transportpro-nuevo.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN || 'ssaavedra.importaciones@gmail.com' }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN || '917ceb996e01d6f911baff79cde3ef7b' }}
        run: |
          surge teardown transportpro-nuevo.surge.sh || true
          sleep 2
          surge . transportpro-nuevo.surge.sh

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL || 'postgresql://postgres.ozmnfdndauyzcsxunxig:TransportPro2026DB@aws-0-sa-east-1.pooler.supabase.com:6543/postgres' }}
        run: |
          echo "🔄 Aplicando migraciones en orden..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" \
              --set ON_ERROR_STOP=0 \
              -q 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones completadas"
