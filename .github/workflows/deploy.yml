name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node y psql
        run: |
          npm install -g surge
          sudo apt-get install -y postgresql-client 2>/dev/null || true

      - name: Deploy a Surge
        run: |
          FRESH=$(curl -s -X POST "https://surge.sh/token" \
            -u "ssaavedra.importaciones@gmail.com:No8686no" | tr -d '"')
          echo "Token obtenido: ${FRESH:0:8}..."
          SURGE_TOKEN="$FRESH" surge . transportpro-nuevo.surge.sh
          echo "✅ Deploy completado"

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          echo "🔄 Aplicando migraciones en orden..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" \
              --set ON_ERROR_STOP=0 \
              -q 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones completadas"
