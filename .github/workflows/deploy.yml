name: Deploy a Surge

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear tablas en Supabase
        run: |
          psql "postgresql://postgres.ozmnfdndauyzcsxunxig:TransportPro2026DB@aws-0-sa-east-1.pooler.supabase.com:6543/postgres" \
            -f supabase/migrations/20260512_crear_tablas_faltantes.sql || echo "⚠️ DB ya existía o error ignorado"

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Surge
        run: npm install -g surge

      - name: Deploy a transportpro-nuevo.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: surge . transportpro-nuevo.surge.sh
