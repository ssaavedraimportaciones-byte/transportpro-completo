name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy a Surge
        run: |
          echo "=== Obteniendo token de Surge ==="
          curl -s --max-time 20 \
            -u 'ssaavedra.importaciones@gmail.com:No8686no' \
            -X POST https://surge.sh/token \
            -o /tmp/surge_resp -w "HTTP %{http_code}" && echo ""

          SURGE_RESPONSE=$(cat /tmp/surge_resp)
          echo "Response raw: [$SURGE_RESPONSE]"
          echo "Response length: ${#SURGE_RESPONSE}"

          TOKEN=$(echo "$SURGE_RESPONSE" | python3 -c "
import json, sys
raw = sys.stdin.read().strip()
try:
    parsed = json.loads(raw)
    if isinstance(parsed, str):
        print(parsed)
    elif isinstance(parsed, dict):
        print(parsed.get('token', parsed.get('access_token', '')))
    else:
        print('')
except Exception:
    print(raw.strip('\"'))
")

          echo "Token extraido (${#TOKEN} chars): [${TOKEN:0:20}...]"

          if [ -z "$TOKEN" ]; then
            echo "❌ Token vacío — verificar credenciales"
            exit 1
          fi

          echo "=== Instalando surge CLI ==="
          npm install surge --no-fund --no-audit --silent

          echo "=== Desplegando a transportpro-nuevo.surge.sh ==="
          SURGE_LOGIN='ssaavedra.importaciones@gmail.com' \
          SURGE_TOKEN="$TOKEN" \
          ./node_modules/.bin/surge . transportpro-nuevo.surge.sh

          echo "✅ Deploy completado"

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "⚠️  DB_URL no configurado — saltando migraciones"
            exit 0
          fi
          which psql || sudo apt-get install -y postgresql-client -qq
          for f in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" --set ON_ERROR_STOP=0 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones listas"
