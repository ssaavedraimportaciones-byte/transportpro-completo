name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Surge
        run: npm install -g surge

      - name: Teardown y redeploy transportpro-nuevo.surge.sh
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          surge teardown transportpro-nuevo.surge.sh || true
          sleep 2
          surge . transportpro-nuevo.surge.sh

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          echo "🔄 Aplicando migraciones en orden..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" \
              --set ON_ERROR_STOP=0 \
              -q 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones completadas"
