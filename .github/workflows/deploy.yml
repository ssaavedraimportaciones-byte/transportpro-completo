name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy a Surge
        run: |
          echo "=== Node / npm version ==="
          node --version
          npm --version

          echo ""
          echo "=== Obteniendo token de Surge ==="
          TOKEN_RAW=$(curl -s --max-time 30 \
            -u "ssaavedra.importaciones@gmail.com:No8686no" \
            -X POST https://surge.sh/token 2>&1)
          echo "Surge API respondió: $TOKEN_RAW"

          TOKEN=$(echo "$TOKEN_RAW" | tr -d '"' | tr -d '[:space:]')
          echo "Token procesado (${#TOKEN} chars): ${TOKEN:0:10}..."

          if [ -z "$TOKEN" ]; then
            echo "❌ FALLO: Surge API no devolvió token (red o credenciales)"
            exit 1
          fi

          if echo "$TOKEN_RAW" | grep -qi '"error"\|unauthorized\|forbidden\|invalid'; then
            echo "❌ FALLO: Surge rechazó las credenciales"
            exit 1
          fi

          echo ""
          echo "=== Instalando surge CLI (local, sin -g) ==="
          npm install surge --no-fund --no-audit --prefer-offline 2>&1 | tail -5
          echo "surge instalado: $(./node_modules/.bin/surge --version 2>&1)"

          echo ""
          echo "=== Desplegando a transportpro-nuevo.surge.sh ==="
          SURGE_LOGIN="ssaavedra.importaciones@gmail.com" \
          SURGE_TOKEN="$TOKEN" \
          ./node_modules/.bin/surge . transportpro-nuevo.surge.sh

          echo ""
          echo "✅ Deploy completado exitosamente"

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "⚠️  DB_URL no configurado — saltando migraciones"
            exit 0
          fi
          which psql || (sudo apt-get install -y postgresql-client -qq 2>/dev/null)
          echo "🔄 Aplicando migraciones en orden..."
          for f in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" --set ON_ERROR_STOP=0 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones listas"
