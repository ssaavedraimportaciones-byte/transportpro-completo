name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy a Surge
        run: |
          echo "=== Obteniendo token de Surge ==="
          TOKEN_RAW=$(curl -s --max-time 30 \
            -u 'ssaavedra.importaciones@gmail.com:No8686no$' \
            -X POST https://surge.sh/token 2>&1)
          echo "Surge API respondió (${#TOKEN_RAW} chars)"

          TOKEN=$(echo "$TOKEN_RAW" | tr -d '"' | tr -d '[:space:]')

          if [ -z "$TOKEN" ] || echo "$TOKEN_RAW" | grep -qi '"error"\|unauthorized\|forbidden'; then
            echo "❌ Error de autenticación Surge: $TOKEN_RAW"
            exit 1
          fi

          echo "✅ Token OK (${#TOKEN} chars)"

          echo "=== Instalando surge CLI ==="
          npm install surge --no-fund --no-audit 2>&1 | tail -3

          echo "=== Desplegando a transportpro-nuevo.surge.sh ==="
          SURGE_LOGIN='ssaavedra.importaciones@gmail.com' \
          SURGE_TOKEN="$TOKEN" \
          ./node_modules/.bin/surge . transportpro-nuevo.surge.sh

          echo "✅ Deploy completado en transportpro-nuevo.surge.sh"

      - name: Aplicar migraciones Supabase
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "⚠️  DB_URL no configurado — saltando migraciones"
            exit 0
          fi
          which psql || sudo apt-get install -y postgresql-client -qq
          for f in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
            echo "→ $f"
            psql "$DB_URL" -f "$f" --set ON_ERROR_STOP=0 2>&1 | grep -v "^NOTICE" || true
          done
          echo "✅ Migraciones listas"
