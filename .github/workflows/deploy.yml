name: Deploy a Surge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Surge
        run: npm install -g surge

      - name: Deploy a transportpro-nuevo.surge.sh
        env:
          SURGE_LOGIN: ssaavedra.importaciones@gmail.com
          SURGE_TOKEN: 917ceb996e01d6f911baff79cde3ef7b
        run: surge . transportpro-nuevo.surge.sh

      - name: Crear tablas en Supabase
        run: |
          which psql && psql "postgresql://postgres.ozmnfdndauyzcsxunxig:TransportPro2026DB@aws-0-sa-east-1.pooler.supabase.com:6543/postgres" \
            -f supabase/migrations/20260512_crear_tablas_faltantes.sql || echo "⚠️ psql no disponible"
